syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "aircraft/attachment.proto";

option java_package = "dev.fanfly.wingslog.aircraft";
option java_multiple_files = true;

// Mirrors ComponentType from MaintenanceLog — kept here for InspectionCard independence
enum InspectionComponentType {
  INSPECTION_COMPONENT_UNKNOWN = 0;
  INSPECTION_COMPONENT_AIRFRAME = 1;
  INSPECTION_COMPONENT_ENGINE = 2;
  INSPECTION_COMPONENT_PROPELLER = 3;
  INSPECTION_COMPONENT_AVIONICS = 4;
}

enum ComplianceType {
  COMPLIANCE_TYPE_ROUTINE_INSPECTION = 0;
  COMPLIANCE_TYPE_SERVICE_BULLETIN = 1;
  COMPLIANCE_TYPE_AIRWORTHINESS_DIRECTIVE = 2;
}

// A time-interval-based rule (e.g. every 12 months)
message TimeRule {
  int32 interval_months = 1;
}

// A engine-hour-based rule (e.g. every 100 hours)
message EngineHourRule {
  float interval_hours = 1;
}

// Inspection is performed on condition (no fixed interval)
message OnConditionRule {
  string description = 1;
}

message LinkedRule {
  string parent_inspection_id = 1; // e.g., ID of the "Annual" card
}

message ImmediateRule {}

// A single rule governing when an inspection is due
message InspectionRule {
  oneof rule {
    TimeRule time_rule = 1;
    EngineHourRule engine_hour_rule = 2;
    OnConditionRule on_condition_rule = 3;
    LinkedRule linked_rule = 4;
    ImmediateRule immediate_rule = 5;
  }
}

// Status to track when an inspection was forcefully marked as complied with
message ForceCompliedStatus {
  google.protobuf.Timestamp complied_date = 1;
  float complied_engine_hours = 2;
}

// A configured inspection card for an aircraft
message InspectionCard {
  string id = 1;
  string title = 2;
  InspectionComponentType component = 3;
  repeated InspectionRule rules = 4;

  // Optional force overrides — when set, skip computed due calculation
  google.protobuf.Timestamp force_due_date = 5;
  float force_due_engine_hour = 6;

  // Optional free-text notes or comments for this inspection card
  string notes = 7;

  // v2 Compliance Tracking
  ComplianceType type = 8;
  string reference_number = 9; // e.g., "SB-2024-01"
  string compliance_authority = 10;
  string compliance_details = 11;
  bool is_one_time = 12; // If true, moves to history after first log
  repeated Attachment attachments = 13;

  ForceCompliedStatus force_complied_status = 14;
}
