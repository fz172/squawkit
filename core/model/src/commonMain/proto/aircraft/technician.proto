syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_package = "dev.fanfly.wingslog.aircraft";
option java_multiple_files = true;

message Technician {
  string id = 1;
  string name = 2;
  string cert_type = 3; // legacy string field — prefer certificate_type (field 7)
  string cert_number = 4;
  google.protobuf.Timestamp cert_expiration = 5;
  CertExpireLimit cert_expire_limit = 6;
  CertificateType certificate_type = 7;

  // Owning uid of the first-party profile this was snapshotted from — the member's own
  // self-record, or another share member's published mirror. Empty for a manual entry typed by
  // hand. Drives the provenance label and the self-signed check (design §7.3/§7.5).
  string source_uid = 8;

  // Set on a MANUAL roster row that the user has reconciled with a share member's mirror: the uid
  // of the member who supersedes it (design §7.4). A soft alias, never a delete — manual rows are
  // user-global while mirrors are per-aircraft, so on an aircraft where that member has no mirror
  // the manual row must still appear. Meaningful only on roster rows; ignored in a log snapshot,
  // which is immutable and must never be rewritten by a merge.
  string superseded_by_uid = 9;
}

enum CertificateType {
  CERTIFICATE_TYPE_NONE = 0;
  CERTIFICATE_TYPE_REPAIRMAN = 1;
  CERTIFICATE_TYPE_AMT = 2;
}

enum CertExpireLimit {
  CERT_EXPIRE_LIMIT_UNKNOWN = 0;
  CERT_EXPIRE_LIMIT_EXPIRES = 1;
  CERT_EXPIRE_LIMIT_NEVER_EXPIRES = 2;
}
