syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_package = "dev.fanfly.wingslog.aircraft";
option java_multiple_files = true;

message MaintenanceLog {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string technician_id = 3;
  string work_description = 4;

  enum ComponentType {
    UNKNOWN = 0;
    AIRFRAME = 1;
    ENGINE = 2;
    PROPELLER = 3;
  }
  ComponentType component_type = 5;

  string component_serial = 6; // References Engine/Prop/Blade Serial

  double engine_hour = 8;

  repeated string attachment_urls = 9;

  // Separate time tracking for each component category
  double airframe_time = 10;
  double prop_time = 11;

  // Inspection cards associated with this log entry
  repeated string inspection_ids = 12;
}
