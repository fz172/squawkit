syntax = "proto3";

option java_package = "dev.fanfly.wingslog.core.model.settings";
option java_multiple_files = true;

message DeveloperSettings {
  // 4 and 7 held export_email_delivery_enabled / attachment_upload_enabled — now gated by the
  // subscription (SubscriptionManager), so they were removed.
  reserved 1, 2, 3, 4, 5, 6, 7;
  reserved "technician_disabled", "attachment_upload_disabled", "export_logs_enabled", "account_upgrade_enabled", "adaptive_shell_enabled", "export_email_delivery_enabled", "attachment_upload_enabled";

  // Developer force-override of the effective subscription tier. UNSET = no override (the real
  // entitlement applies); SubscriptionManager honors this only in developer builds.
  ForceSubscriptionStatus force_subscription_status = 8;

  enum ForceSubscriptionStatus {
    FORCE_SUBSCRIPTION_STATUS_UNSET = 0;
    FORCE_SUBSCRIPTION_STATUS_FREE = 1;
    FORCE_SUBSCRIPTION_STATUS_PRO = 2;
  }
}
