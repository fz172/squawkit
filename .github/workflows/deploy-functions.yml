name: Deploy Cloud Functions

# Cloud Functions live in backend/firebase/functions. On a PR touching them this runs the emulator
# test suite as a gate; on merge to main it re-runs the suite and deploys to wingslog-9ca4e.
on:
  pull_request:
    paths:
      - backend/firebase/functions/src/**
      - backend/firebase/functions/test/**
      - backend/firebase/functions/package.json
      - backend/firebase/functions/package-lock.json
      - backend/firebase/functions/tsconfig.json
      - backend/firebase/firebase.json
      - .github/workflows/deploy-functions.yml
  push:
    branches: [main]
    paths:
      - backend/firebase/functions/src/**
      - backend/firebase/functions/test/**
      - backend/firebase/functions/package.json
      - backend/firebase/functions/package-lock.json
      - backend/firebase/functions/tsconfig.json
      - backend/firebase/firebase.json
      - .github/workflows/deploy-functions.yml
  workflow_dispatch:

# Never cancel an in-flight production deploy; serialize function deploys.
concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  test:
    name: Test functions (emulator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/firebase/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/firebase/functions/package-lock.json

      # The Firestore emulator is a Java process.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Install dependencies
        run: npm ci

      # `npm test` runs `firebase emulators:exec`, so the CLI must be on PATH as `firebase`.
      - name: Install firebase-tools
        run: npm i -g firebase-tools@latest

      - name: Run tests against the Firestore emulator
        run: npm test

  deploy:
    name: Deploy functions to wingslog-9ca4e
    needs: test
    # PRs only gate on the tests above; deploy runs on merge to main and manual dispatch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/firebase/functions/package-lock.json

      # firebase deploy's predeploy hook runs `tsc` in the functions dir, which needs its dev deps.
      - name: Install function dependencies
        working-directory: backend/firebase/functions
        run: npm ci

      # Mirrors the auth pattern in deploy-web.yml: write the service-account key to a temp file,
      # point ADC at it, deploy, and remove the key even if the deploy fails.
      - name: Deploy Cloud Functions
        working-directory: backend/firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WINGSLOG_9CA4E }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          trap 'rm -f "$RUNNER_TEMP/firebase-sa.json"' EXIT
          npx firebase-tools@latest deploy --only functions \
            --project wingslog-9ca4e --non-interactive --force
