name: Deploy Web App

on:
  workflow_dispatch:

# Never run two deploys at once; cancel an in-progress run if a newer one starts.
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Caches dependencies, the Gradle build cache (task outputs incl. the Kotlin/JS compile),
      # and the Kotlin-managed Node/Yarn toolchain under ~/.gradle, so only the non-cacheable
      # webpack bundling re-runs on subsequent runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/JS node_modules
        uses: actions/cache@v4
        with:
          path: |
            build/js
            kotlin-js-store
          key: kotlinjs-${{ runner.os }}-${{ hashFiles('kotlin-js-store/yarn.lock') }}
          restore-keys: |
            kotlinjs-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Produces the production bundle in webApp/build/dist/js/productionExecutable,
      # which is the "public" directory configured in firebase.json.
      # Raise Node's heap: webpack bundling the large Compose/Skiko output exceeds Node's default
      # ~2 GB cap and dies with ERR_WORKER_OUT_OF_MEMORY. NODE_OPTIONS propagates to the worker
      # thread too. 4 GB for Node + the Gradle daemon stays within the 7 GB private-repo runner.
      - name: Build production web bundle
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: ./gradlew :webApp:jsBrowserDistribution --stacktrace

      # Deploy via firebase-tools directly rather than FirebaseExtended/action-hosting-deploy.
      # On this runner every HTTPS request hits "premature close" and firebase-tools retries; the
      # non-idempotent channel-release POST then fails the retry with "version … is the current
      # active version" even though the first attempt already released it. The action treats that
      # as a failure (and auto-reruns with --debug, deploying again). Calling the CLI ourselves lets
      # us treat that specific precondition as success, because the channel is already updated.
      - name: Deploy to Firebase Hosting (alpha channel)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WINGSLOG_9CA4E }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          set +e
          out=$(npx firebase-tools@latest hosting:channel:deploy alpha \
            --expires 7d --project wingslog-9ca4e --non-interactive 2>&1)
          code=$?
          echo "$out"
          rm -f "$RUNNER_TEMP/firebase-sa.json"
          if [ "$code" -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "::notice::Channel 'alpha' already points to this version — deploy succeeded; ignoring the non-idempotent release-retry error."
            exit 0
          fi
          exit "$code"
