name: Deploy Web App

on:
  workflow_dispatch:

# Never run two deploys at once; cancel an in-progress run if a newer one starts.
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Caches dependencies, the Gradle build cache (task outputs incl. the Kotlin/JS compile),
      # and the Kotlin-managed Node/Yarn toolchain under ~/.gradle, so only the non-cacheable
      # webpack bundling re-runs on subsequent runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/JS node_modules
        uses: actions/cache@v4
        with:
          path: |
            build/js
            kotlin-js-store
          key: kotlinjs-${{ runner.os }}-${{ hashFiles('kotlin-js-store/yarn.lock') }}
          restore-keys: |
            kotlinjs-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Produces the production bundle in webApp/build/dist/js/productionExecutable,
      # which is the "public" directory configured in firebase.json.
      - name: Build production web bundle
        run: ./gradlew :webApp:jsBrowserDistribution --stacktrace

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WINGSLOG_9CA4E }}
          projectId: wingslog-9ca4e
          channelId: alpha
