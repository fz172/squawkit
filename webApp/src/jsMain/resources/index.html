<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopply</title>
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="icon" href="favicon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#F3EDF7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#211F26" media="(prefers-color-scheme: dark)">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #F3EDF7; }
        @media (prefers-color-scheme: dark) {
            html, body { background: #211F26; }
        }
        #ComposeTarget { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <script>
    (function(){
        var m=localStorage.getItem('appearance_mode');
        if(m==='DARK'||m==='LIGHT'){
            var c=m==='DARK'?'#211F26':'#F3EDF7';
            document.documentElement.style.background=c;
            document.body.style.background=c;
        }
    })();
    </script>
    <div id="ComposeTarget"></div>
    <script src="webApp.js"></script>
</body>
</html>
