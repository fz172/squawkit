            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-align: center;
        }

            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
