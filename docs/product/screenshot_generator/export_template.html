<meta charset="utf-8">
<title>export</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    font-weight: 700;
    font-style: normal;
    src: url(data:font/ttf;base64,__SG_BOLD__) format('truetype');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-weight: 500;
    font-style: normal;
    src: url(data:font/ttf;base64,__JBM_MEDIUM__) format('truetype');
  }

  :root {
    --deep-navy: #001849;
    --aviation-blue: #1A5FAE;
    --panel-slate: #525E72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 2364px;
    overflow: hidden;
    background: #fff;
  }

  .canvas {
    position: relative;
    width: 1080px;
    height: 2364px;
    container-type: inline-size;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 70% at 15% 0%, #E7EFFD 0%, transparent 55%),
      linear-gradient(165deg, #DCE7FC 0%, #F3F6FC 46%, #FDFCF9 100%);
  }

  .headline {
    position: absolute;
    top: 6.5%;
    left: 7.5%;
    right: 8%;
    z-index: 4;
  }
  .headline .l1, .headline .l2 {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-weight: 700;
    font-size: 7.6cqw;
    line-height: 0.98;
    letter-spacing: -0.01em;
  }
  .headline .l1 { color: var(--deep-navy); }
  .headline .l2 { color: var(--aviation-blue); }

  .wordmark {
    position: absolute;
    left: 7.5%;
    top: 17.5%;
    z-index: 4;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 3cqw;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--panel-slate);
  }
  .wordmark b { color: var(--aviation-blue); font-weight: 500; }

  .phone {
    position: absolute;
    width: 82%;
    aspect-ratio: 1080 / 2364;
    right: -9%;
    bottom: -4%;
    transform: rotate(-6.5deg);
    transform-origin: bottom right;
    border-radius: 9.5cqw;
    border: 2.4cqw solid #14141A;
    background: #14141A;
    box-shadow:
      0 6cqw 8cqw -3cqw rgba(0, 24, 73, 0.45),
      0 1.4cqw 0 rgba(255,255,255,0.08) inset;
    overflow: hidden;
    z-index: 2;
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 34%;
    height: 3.6%;
    background: #14141A;
    border-radius: 0 0 18px 18px;
    z-index: 3;
  }
  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: __OBJECT_POSITION__;
    display: block;
  }
</style>

<div class="canvas">
  <div class="bg"></div>

  <div class="headline">
    <p class="l1">__HEADLINE_L1__</p>
    <p class="l2">__HEADLINE_L2__</p>
  </div>

  <p class="wordmark">Squawk<b>It</b> · __FEATURE_LABEL__</p>

  <div class="phone">
    <img src="data:image/png;base64,__SCREENSHOT_B64__" alt="" />
  </div>
</div>
