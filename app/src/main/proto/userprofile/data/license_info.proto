syntax = "proto3";
import "userprofile/data/license_type.proto";
import "google/protobuf/timestamp.proto";


option java_package = "dev.fanfly.wingslog.userprofile.data";
option java_multiple_files = true;

message LicenseInfo {

  LicenseType license_type = 1;
  string license_number = 2;
  google.protobuf.Timestamp expiration_date = 3;
  LicenseExpireLimit expireLimit = 4;

}

enum LicenseExpireLimit {
  UNKNOWN = 0;
  EXPIRES = 1;
  NEVER_EXPIRES = 2;
}